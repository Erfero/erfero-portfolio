name: Vérification des liens de boutiques

on:
  schedule:
    # Toutes les 20 minutes (contourne la limite "1x/jour" du plan Vercel gratuit)
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler l'API de vérification des liens
        run: |
          curl -sf -X POST "https://erfero-portfolio.vercel.app/api/check-links" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -o response.json
          cat response.json
